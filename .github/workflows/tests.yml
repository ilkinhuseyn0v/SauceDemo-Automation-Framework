name: QA Automation CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu Çek (Checkout)
        uses: actions/checkout@v4

      - name: Java Kurulumu (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Testleri Koştur (Headless Mode)
        run: mvn clean test

      - name: Allure Raporu Oluştur
        if: always()
        run: |
          mvn allure:report

      - name: Raporu GitHub Pages'e Yükle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin